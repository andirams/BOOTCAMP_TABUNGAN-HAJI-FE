<!doctype html>

<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Penarikan Dana - BSI Mobile</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <style>
      .material-symbols-outlined {
        font-family: "Material Symbols Outlined";
        font-weight: normal;
        font-style: normal;
        font-size: 24px;
        line-height: 1;
        letter-spacing: normal;
        text-transform: none;
        display: inline-block;
        white-space: nowrap;
        word-wrap: normal;
        direction: ltr;
        -webkit-font-feature-settings: "liga";
        -webkit-font-smoothing: antialiased;
      }
    </style>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "secondary-fixed": "#ffdeaa",
              surface: "#fbf9f8",
              "tertiary-fixed": "#e2e2e2",
              "surface-container-low": "#f6f3f2",
              "on-surface-variant": "#3f4943",
              "error-container": "#ffdad6",
              "tertiary-container": "#585a5a",
              background: "#fbf9f8",
              "secondary-container": "#feb71a",
              "on-surface": "#1b1c1c",
              "surface-container-highest": "#e4e2e1",
              "primary-fixed": "#a0f4ca",
              "on-tertiary-fixed": "#1a1c1c",
              "on-primary-fixed": "#002114",
              "on-error": "#ffffff",
              "on-error-container": "#93000a",
              "on-secondary-container": "#6b4b00",
              "on-tertiary": "#ffffff",
              "surface-dim": "#dcd9d9",
              "on-primary-fixed-variant": "#005137",
              tertiary: "#414343",
              "on-secondary-fixed": "#271900",
              outline: "#6f7a72",
              "primary-fixed-dim": "#84d7af",
              "on-primary": "#ffffff",
              "inverse-surface": "#303030",
              "surface-container": "#f0eded",
              "surface-bright": "#fbf9f8",
              "inverse-primary": "#84d7af",
              "on-primary-container": "#8fe2ba",
              "surface-variant": "#e4e2e1",
              "surface-container-high": "#eae8e7",
              secondary: "#7d5700",
              "on-secondary": "#ffffff",
              "secondary-fixed-dim": "#ffba2c",
              "on-secondary-fixed-variant": "#5f4100",
              "surface-tint": "#0b6c4b",
              "on-tertiary-fixed-variant": "#454747",
              "inverse-on-surface": "#f3f0f0",
              "primary-container": "#006747",
              "on-tertiary-container": "#d1d1d1",
              "tertiary-fixed-dim": "#c6c6c7",
              "surface-container-lowest": "#ffffff",
              "outline-variant": "#bec9c1",
              "on-background": "#1b1c1c",
              error: "#ba1a1a",
              primary: "#004d34",
            },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "0.75rem",
              full: "9999px",
            },
            spacing: {
              xxl: "48px",
              xs: "4px",
              "container-max": "1200px",
              md: "16px",
              gutter: "24px",
              xl: "32px",
              sm: "12px",
              lg: "24px",
              base: "8px",
            },
            fontFamily: {
              "label-sm": ["Plus Jakarta Sans"],
              "headline-lg-mobile": ["Plus Jakarta Sans"],
              "headline-lg": ["Plus Jakarta Sans"],
              "headline-xl": ["Plus Jakarta Sans"],
              "body-lg": ["Plus Jakarta Sans"],
              "headline-md": ["Plus Jakarta Sans"],
              "body-sm": ["Plus Jakarta Sans"],
              "label-md": ["Plus Jakarta Sans"],
              "body-md": ["Plus Jakarta Sans"],
            },
            fontSize: {
              "label-sm": ["12px", { lineHeight: "16px", fontWeight: "500" }],
              "headline-lg-mobile": [
                "24px",
                { lineHeight: "32px", fontWeight: "700" },
              ],
              "headline-lg": [
                "32px",
                {
                  lineHeight: "40px",
                  letterSpacing: "-0.01em",
                  fontWeight: "700",
                },
              ],
              "headline-xl": [
                "40px",
                {
                  lineHeight: "52px",
                  letterSpacing: "-0.02em",
                  fontWeight: "700",
                },
              ],
              "body-lg": ["18px", { lineHeight: "28px", fontWeight: "400" }],
              "headline-md": [
                "24px",
                { lineHeight: "32px", fontWeight: "600" },
              ],
              "body-sm": ["14px", { lineHeight: "20px", fontWeight: "400" }],
              "label-md": ["14px", { lineHeight: "20px", fontWeight: "600" }],
              "body-md": ["16px", { lineHeight: "24px", fontWeight: "400" }],
            },
          },
        },
      };
    </script>
  </head>
  <body
    class="bg-surface font-body-md text-on-surface antialiased overflow-hidden"
  >
    <!-- Background Dashboard Context (Blurred/Darkened for Modal) -->
    <div class="flex h-screen w-full relative">
      <!-- SideNavBar -->
      <nav
        class="hidden md:flex flex-col h-screen w-64 fixed left-0 top-0 bg-surface-container-low p-md gap-base z-10 border-r border-surface-variant"
      >
        <div class="mb-lg px-md">
          <span
            class="font-headline-md text-headline-md font-bold text-primary tracking-tight"
            >BSI</span
          >
        </div>
        <div class="flex flex-col gap-xs flex-grow">
          <!-- Active Tab -->
          <a
            class="flex items-center gap-md bg-primary text-on-primary rounded-lg px-md py-sm"
            href="#"
          >
            <span
              class="material-symbols-outlined"
              style="font-variation-settings: &quot;FILL&quot; 1"
              >home</span
            >
            <span class="font-label-md text-label-md">Beranda</span>
          </a>
          <!-- Inactive Tabs -->
          <a
            class="flex items-center gap-md text-on-surface-variant hover:bg-surface-container-high rounded-lg px-md py-sm transition-all"
            href="#"
          >
            <span class="material-symbols-outlined"
              >account_balance_wallet</span
            >
            <span class="font-label-md text-label-md">Rekening</span>
          </a>
          <a
            class="flex items-center gap-md text-on-surface-variant hover:bg-surface-container-high rounded-lg px-md py-sm transition-all"
            href="#"
          >
            <span class="material-symbols-outlined">swap_horiz</span>
            <span class="font-label-md text-label-md">Transaksi</span>
          </a>
          <a
            class="flex items-center gap-md text-on-surface-variant hover:bg-surface-container-high rounded-lg px-md py-sm transition-all"
            href="#"
          >
            <span class="material-symbols-outlined">description</span>
            <span class="font-label-md text-label-md">Laporan</span>
          </a>
        </div>
        <div
          class="mt-auto border-t border-surface-variant pt-md flex flex-col gap-xs"
        >
          <a
            class="flex items-center gap-md text-on-surface-variant hover:bg-surface-container-high rounded-lg px-md py-sm transition-all"
            href="#"
          >
            <span class="material-symbols-outlined">settings</span>
            <span class="font-label-md text-label-md">Pengaturan</span>
          </a>
          <a
            class="flex items-center gap-md text-on-surface-variant hover:bg-surface-container-high rounded-lg px-md py-sm transition-all"
            href="#"
          >
            <span class="material-symbols-outlined">help</span>
            <span class="font-label-md text-label-md">Bantuan</span>
          </a>
        </div>
      </nav>
      <!-- Main Content Area -->
      <main
        class="flex-1 md:ml-64 flex flex-col h-screen overflow-hidden filter blur-sm"
      >
        <!-- TopNavBar -->
        <header
          class="flex justify-between items-center px-lg py-base w-full sticky top-0 z-50 bg-surface shadow-sm h-16"
        >
          <div class="md:hidden">
            <span
              class="font-headline-md text-headline-md font-bold text-primary"
              >BSI Mobile</span
            >
          </div>
          <div
            class="hidden md:block font-headline-md text-headline-md font-bold text-on-surface"
          >
            Overview
          </div>
          <div class="flex items-center gap-md">
            <div
              class="flex items-center gap-sm bg-surface-container-low rounded-full px-sm py-xs"
            >
              <img
                alt="Ahmad Fauzi"
                class="w-8 h-8 rounded-full border border-surface-variant"
                data-alt="A professional headshot of an Indonesian man, smiling softly, lit by natural office light. The image has a clean, corporate feel, suitable for a banking profile picture, with a subtle neutral background."
                src="https://lh3.googleusercontent.com/aida-public/AB6AXuDKjf74I9Mg9m9CzoTd_1BGTakMxryYy-oJL_7zA4erSDSWUICGzQZ4chI4_16mY-A2ECtxuFUCL2Qq7VK2G7s7PfH9mHmRePl0qDTc-eiwvT3fSnXkemBQnnT6_w6tQeqxIyXSQytD2FdHbkk0i7zY94vssUIXJ0iGD4lF0UEotBpPJ3LJehqgZ6oZoarVxv4U6kMMQtYHeqGpbsUsKYpdD-SnqgfTTz4-BoMfB1AAK28xaaP4aYtW52tuGoE2hvKyVFtQVAml5k8C"
              />
              <span
                class="font-label-md text-label-md text-on-surface hidden sm:block"
                >Ahmad Fauzi</span
              >
              <span
                class="material-symbols-outlined text-on-surface-variant text-sm"
                >expand_more</span
              >
            </div>
          </div>
        </header>
        <!-- Dummy Dashboard Content -->
        <div
          class="p-lg md:p-gutter flex flex-col gap-gutter bg-surface-container-low min-h-full"
        >
          <!-- Cards Row -->
          <div class="grid grid-cols-1 md:grid-cols-3 gap-md">
            <div
              class="bg-surface rounded-xl p-md shadow-sm border border-surface-variant border-l-4 border-l-primary h-32"
            ></div>
            <div
              class="bg-surface rounded-xl p-md shadow-sm border border-surface-variant h-32"
            ></div>
            <div
              class="bg-surface rounded-xl p-md shadow-sm border border-surface-variant h-32"
            ></div>
          </div>
          <div
            class="bg-surface rounded-xl p-md shadow-sm border border-surface-variant h-64"
          ></div>
        </div>
      </main>
      <!-- Modal Overlay -->
      <div
        class="fixed inset-0 z-[100] flex items-center justify-center bg-inverse-surface/60 backdrop-blur-sm p-4"
      >
        <!-- Modal Container -->
        <div
          class="bg-surface rounded-xl shadow-lg w-full max-w-[480px] overflow-hidden flex flex-col"
        >
          <!-- Modal Header -->
          <div
            class="flex justify-between items-center p-md border-b border-surface-variant bg-surface"
          >
            <h2 class="font-headline-md text-headline-md text-on-surface">
              Penarikan
            </h2>
            <button
              class="text-on-surface-variant hover:text-error transition-colors rounded-full p-1 hover:bg-surface-container-high"
            >
              <span class="material-symbols-outlined">close</span>
            </button>
          </div>
          <!-- Modal Body (Form) -->
          <div class="p-lg flex flex-col gap-xl">
            <!-- Account Selection -->
            <div class="flex flex-col gap-xs">
              <label class="font-label-md text-label-md text-on-surface-variant"
                >Sumber Rekening</label
              >
              <button
                class="flex items-center justify-between w-full p-sm rounded-lg border border-outline-variant hover:border-primary bg-surface-container-lowest text-left transition-colors"
              >
                <div class="flex items-center gap-sm">
                  <div
                    class="w-10 h-10 rounded-full bg-primary-container/10 flex items-center justify-center text-primary"
                  >
                    <span class="material-symbols-outlined"
                      >account_balance_wallet</span
                    >
                  </div>
                  <div class="flex flex-col">
                    <span class="font-label-md text-label-md text-on-surface"
                      >Tabungan Wadiah</span
                    >
                    <span
                      class="font-body-sm text-body-sm text-on-surface-variant"
                      >7123 4567 8900</span
                    >
                  </div>
                </div>
                <span class="material-symbols-outlined text-outline"
                  >expand_more</span
                >
              </button>
              <div class="flex justify-between mt-1 px-1">
                <span class="font-body-sm text-body-sm text-on-surface-variant"
                  >Saldo Tersedia:</span
                >
                <span class="font-label-md text-label-md text-on-surface"
                  >Rp 1.250.000</span
                >
              </div>
            </div>
            <!-- Nominal Input (Error State) -->
            <div class="flex flex-col gap-xs relative">
              <label class="font-label-md text-label-md text-on-surface-variant"
                >Nominal Penarikan</label
              >
              <div class="relative flex items-center">
                <span
                  class="absolute left-sm font-headline-md text-headline-md text-on-surface-variant pl-xs"
                  >Rp</span
                >
                <input
                  class="w-full font-headline-md text-headline-md text-on-surface bg-surface border border-error rounded-lg pl-12 pr-md py-sm focus:outline-none focus:ring-1 focus:ring-error transition-shadow"
                  type="text"
                  value="2.500.000"
                />
              </div>
              <!-- Validation Message -->
              <div class="flex items-start gap-1 mt-1 text-error">
                <span class="material-symbols-outlined text-[18px]">error</span>
                <span class="font-body-sm text-body-sm"
                  >Saldo harus mencukupi</span
                >
              </div>
            </div>
            <!-- Withdrawal Method -->
            <div class="flex flex-col gap-sm">
              <label class="font-label-md text-label-md text-on-surface-variant"
                >Metode Penarikan</label
              >
              <div class="grid grid-cols-2 gap-md">
                <!-- Method 1: Selected -->
                <label class="cursor-pointer relative">
                  <input
                    checked=""
                    class="peer sr-only"
                    name="method"
                    type="radio"
                  />
                  <div
                    class="p-md border rounded-lg border-primary bg-primary/5 peer-checked:border-primary peer-checked:bg-primary/5 transition-all flex flex-col items-center justify-center gap-sm h-full text-center"
                  >
                    <span class="material-symbols-outlined text-primary"
                      >atm</span
                    >
                    <span class="font-label-md text-label-md text-on-surface"
                      >Tarik Tunai ATM</span
                    >
                  </div>
                  <div
                    class="absolute top-2 right-2 hidden peer-checked:block text-primary"
                  >
                    <span
                      class="material-symbols-outlined text-[18px]"
                      style="font-variation-settings: &quot;FILL&quot; 1"
                      >check_circle</span
                    >
                  </div>
                </label>
                <!-- Method 2: Unselected -->
                <label class="cursor-pointer relative">
                  <input class="peer sr-only" name="method" type="radio" />
                  <div
                    class="p-md border rounded-lg border-outline-variant hover:border-outline bg-surface-container-lowest transition-all flex flex-col items-center justify-center gap-sm h-full text-center"
                  >
                    <span
                      class="material-symbols-outlined text-on-surface-variant"
                      >account_balance</span
                    >
                    <span
                      class="font-label-md text-label-md text-on-surface-variant"
                      >Transfer Cabang</span
                    >
                  </div>
                </label>
              </div>
            </div>
          </div>
          <!-- Modal Footer -->
          <div
            class="p-md border-t border-surface-variant bg-surface-container-low flex justify-end gap-md items-center"
          >
            <button
              class="font-label-md text-label-md text-primary hover:text-primary-container px-md py-sm rounded-lg transition-colors bg-transparent"
            >
              Batal
            </button>
            <!-- Disabled Button due to error -->
            <button
              class="font-label-md text-label-md bg-primary text-on-primary px-lg py-sm rounded-lg opacity-50 cursor-not-allowed transition-all flex items-center gap-2"
              disabled=""
            >
              Tarik Dana
            </button>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
