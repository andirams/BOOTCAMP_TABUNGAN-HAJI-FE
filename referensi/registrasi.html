    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: theme('colors.surface-container-low');
        }

        .bg-pattern {
            background-image: radial-gradient(theme('colors.primary-container') 1px, transparent 1px);
            background-size: 20px 20px;
            opacity: 0.03;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 24px rgba(0, 103, 71, 0.05);
        }

        .floating-input:focus~label,
        .floating-input:not(:placeholder-shown)~label {
            transform: translateY(-1.2rem) scale(0.85);
            color: theme('colors.primary-container');
        }
    </style>

<body class="min-h-screen flex flex-col items-center justify-center relative overflow-x-hidden">
    <!-- Decorative Background Pattern -->
    <div class="absolute inset-0 bg-pattern z-0 pointer-events-none"></div>
    <!-- Main Registration Container -->
    <main class="w-full max-w-md px-md md:px-0 z-10 relative">
        <div class="glass-card rounded-xl p-xl flex flex-col gap-lg">
            <!-- Header/Brand -->
            <div class="text-center flex flex-col items-center gap-sm">
                <div class="w-16 h-16 bg-primary-container rounded-lg flex items-center justify-center mb-sm shadow-sm">
                    <span class="material-symbols-outlined text-on-primary text-3xl"
                        style="font-variation-settings: 'FILL' 1;">mosque</span>
                </div>
                <h1
                    class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-primary">
                    Tabungan Haji BSI</h1>
                <p class="font-body-md text-body-md text-on-surface-variant">Daftar untuk memulai persiapan ibadah haji
                    Anda dengan aman dan sesuai syariah.</p>
            </div>
            <!-- Registration Form -->
            <form class="flex flex-col gap-md mt-md">
                <!-- Email Input -->
                <div class="relative">
                    <input
                        class="floating-input w-full px-md pt-lg pb-sm border border-outline-variant rounded-lg bg-surface-container-lowest text-on-surface focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-all peer font-body-md text-body-md"
                        id="email" placeholder=" " required="" type="email" />
                    <label
                        class="absolute left-md top-3 text-on-surface-variant font-body-md text-body-md transition-all pointer-events-none origin-left"
                        for="email">Alamat Email</label>
                    <span
                        class="material-symbols-outlined absolute right-md top-1/2 -translate-y-1/2 text-outline-variant peer-focus:text-primary-container transition-colors">mail</span>
                </div>
                <!-- Password Input -->
                <div class="relative">
                    <input
                        class="floating-input w-full px-md pt-lg pb-sm border border-outline-variant rounded-lg bg-surface-container-lowest text-on-surface focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-all peer font-body-md text-body-md"
                        id="password" placeholder=" " required="" type="password" />
                    <label
                        class="absolute left-md top-3 text-on-surface-variant font-body-md text-body-md transition-all pointer-events-none origin-left"
                        for="password">Kata Sandi</label>
                    <button
                        class="absolute right-md top-1/2 -translate-y-1/2 text-outline-variant hover:text-primary-container transition-colors focus:outline-none"
                        type="button">
                        <span class="material-symbols-outlined">visibility_off</span>
                    </button>
                </div>
                <!-- Confirm Password Input -->
                <div class="relative">
                    <input
                        class="floating-input w-full px-md pt-lg pb-sm border border-outline-variant rounded-lg bg-surface-container-lowest text-on-surface focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-all peer font-body-md text-body-md"
                        id="confirm_password" placeholder=" " required="" type="password" />
                    <label
                        class="absolute left-md top-3 text-on-surface-variant font-body-md text-body-md transition-all pointer-events-none origin-left"
                        for="confirm_password">Konfirmasi Kata Sandi</label>
                    <button
                        class="absolute right-md top-1/2 -translate-y-1/2 text-outline-variant hover:text-primary-container transition-colors focus:outline-none"
                        type="button">
                        <span class="material-symbols-outlined">visibility_off</span>
                    </button>
                </div>
                <!-- Submit Button -->
                <button
                    class="w-full bg-primary-container hover:bg-primary text-on-primary font-label-md text-label-md py-md rounded-lg transition-colors mt-sm shadow-sm flex justify-center items-center gap-sm"
                    type="submit">
                    <span>Daftar</span>
                    <span class="material-symbols-outlined text-lg">arrow_forward</span>
                </button>
            </form>
            <!-- Login Link -->
            <div class="text-center mt-sm">
                <p class="font-body-sm text-body-sm text-on-surface-variant">Sudah memiliki akun?
                    <a class="font-label-md text-label-md text-primary-container hover:text-primary transition-colors ml-xs"
                        href="#">Masuk di sini</a>
                </p>
            </div>
        </div>
    </main>
    <!-- System Health Indicator (Bottom Right) -->
    <div
        class="fixed bottom-lg right-lg z-20 flex items-center gap-sm bg-surface-container-lowest py-xs px-sm rounded-full shadow-sm border border-outline-variant">
        <span class="relative flex h-3 w-3">
            <span
                class="animate-ping absolute inline-flex h-full w-full rounded-full bg-primary-container opacity-75"></span>
            <span class="relative inline-flex rounded-full h-3 w-3 bg-primary-container"></span>
        </span>
        <span class="font-label-sm text-label-sm text-on-surface-variant">Sistem Online</span>
    </div>
</body>

</html>
